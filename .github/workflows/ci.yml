name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [ published ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Cache cargo & target directories
        uses: Swatinem/rust-cache@v2
        with:
          key: "v2"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --verbose
      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Build Docs
        run: cargo doc --verbose
      - name: Test
        run: cargo test --all-targets --all-features

  loom-tests:
    name: Loom permutation tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Cache cargo & target directories
        uses: Swatinem/rust-cache@v2
        with:
          key: "loom-v1"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      # Loom-incompatible dev-deps are gated on `cfg(not(loom))` in Cargo.toml,
      # so this build collapses to just the library + loom. The harness lives
      # in `src/session/core.rs` (see #29).
      - name: Run loom models
        run: cargo test --lib --release
        env:
          RUSTFLAGS: "--cfg loom"

  mutation-tests:
    name: Mutation tests
    needs: build-and-test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Cache cargo & target directories
        uses: Swatinem/rust-cache@v2
        with:
          key: "mutants-v1"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants
      - name: Capture checker/combinator diff
        run: git diff origin/${{ github.base_ref }}...HEAD -- src/checker.rs src/combinators.rs > mutants.diff
      - name: Run focused mutation tests
        run: >
          cargo mutants
          --in-place
          --in-diff=mutants.diff
          --file src/checker.rs
          --file src/combinators.rs
          --baseline=skip
          --timeout=60
          --build-timeout=300
          --all-features
          --
          --test checker_contract
        env:
          PROPTEST_CASES: 128
      - name: Upload mutation test report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mutants-out
          path: mutants.out

  release:
    name: Release
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event.release && github.event.action == 'published'
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Cache cargo & target directories
        uses: Swatinem/rust-cache@v2
        with:
          key: "v2"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release --verbose
      - name: Cargo Login
        run: cargo login ${{ secrets.CRATES_IO_API_TOKEN }}
      - name: Publish
        run: cargo publish
